  <body>
    <header>
      <div class="logo">
        <img loading="lazy" src="images/logo.jpeg" alt="" />

      <ul class="uls">

                  <div class="rank">#1</div>
                </div>
                <div class="middlesec">
                  <div class="card-sch-type">Public</div>
                  <div class="location">Kumasi | Ashanti Region</div>
                </div>
                <div class="downsec">
                  <button>View Profile</button>
                </div>
            </div>
           
          </div>

          <img src="images/logo.jpeg" alt="logo" usemap="#work">

          <map name="work">
            <area shape="rect" coords="10,10,10,10" href="unilift.html" alt="cpp">
          </map>

          <table>

            <caption>this is a table</caption>

      </div>
