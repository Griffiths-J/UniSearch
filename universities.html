<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="images/w-logo.jpeg" />
    <link rel="stylesheet" href="style/unilift.css" />
    <link rel="stylesheet" href="style/navsContent.css">
    <title>Unilift | Universities</title>
  </head>
  <body>
    <header>
      <div class="logo">
         <img loading="lazy" src="images/u-logo.png" alt="logo" /><p>UniLift</p>
      </div>

      <ul class="uls">
        <a  href="#"><li>Universities</li></a>
        <a href="how-works.html"><li>How it Works</li></a>
        <a href="hostel.html"><li>Hostel</li></a>
        <div class="astray">
          <a class="last last-js" href="#">Get Started</a>
        </div>
      </ul>

      <div class="burger">
        <div class="line line1"></div>
        <div class="line line2"></div>
        <div class="line line3"></div>
      </div>
    </header>

    <main>
      <div class="universities">

          <p class="uni-p">Explore Universities In Ghana</p>

          <div class="searchCont">
              <div class="search">
                <img src="icons/search.svg" alt="search_icon">
                <input type="text" placeholder=" search university eg KNUST,UG,UCC .....">
              </div>
          </div>

          

          <div class="gridCont">
            <div class="card">
                <div class="topsec">
                  <img class="card-img" src="images/kwame-nkrumah-university-of-science-technology-seeklogo.png" alt="knust logo">
                  <p class="card-sch">KNUST</p>
                  <div class="rank">#1</div>
                </div>
                <div class="middlesec">
                  <div class="card-sch-type">Public</div>
                  <div class="location">Kumasi | Ashanti Region</div>
                </div>
                <div class="downsec">
                  <button>View Profile</button>
                </div>
            </div>
           
          </div>
      </div>
    </main>
      

    <footer></footer>
    <script src="script/burger.js"></script>
  </body>
</html>
